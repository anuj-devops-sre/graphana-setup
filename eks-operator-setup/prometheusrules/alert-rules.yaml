apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-instance-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: instance-health
      rules:
        - alert: InstanceDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Target {{ $labels.instance }} down"
            description: "{{ $labels.job }} on {{ $labels.instance }} down >1m."
        - alert: HighCPUUsage
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.instance }}"
            description: "CPU 5 min se 80% ke upar."
