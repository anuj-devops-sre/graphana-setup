prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

grafana:
  adminPassword: "CHANGE_ME"
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'slack-default'
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'slack-critical'
          repeat_interval: 1h
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['instance']
    receivers:
      - name: 'slack-default'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'
            channel: '#alerts'
            send_resolved: true
      - name: 'slack-critical'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'
            channel: '#alerts-critical'
            send_resolved: true
