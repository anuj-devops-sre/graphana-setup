apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  custom-overview.json: |
    {
      "title": "Custom Cluster Overview",
      "uid": "custom-overview",
      "schemaVersion": 39,
      "panels": [
        {
          "type": "stat",
          "title": "Targets Up",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [
            { "expr": "count(up == 1)", "refId": "A" }
          ]
        }
      ]
    }
